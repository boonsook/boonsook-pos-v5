<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect width="200" height="200" rx="44" fill="url(#shine)"/>

  <!-- Snowflake / AC icon -->
  <g transform="translate(100,58)" stroke="#fff" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9">
    <line x1="0" y1="-22" x2="0" y2="22"/>
    <line x1="-19" y1="-11" x2="19" y2="11"/>
    <line x1="-19" y1="11" x2="19" y2="-11"/>
    <!-- branches -->
    <line x1="0" y1="-22" x2="-6" y2="-15"/>
    <line x1="0" y1="-22" x2="6" y2="-15"/>
    <line x1="0" y1="22" x2="-6" y2="15"/>
    <line x1="0" y1="22" x2="6" y2="15"/>
    <line x1="-19" y1="-11" x2="-13" y2="-5"/>
    <line x1="19" y1="11" x2="13" y2="5"/>
    <line x1="-19" y1="11" x2="-13" y2="5"/>
    <line x1="19" y1="-11" x2="13" y2="-5"/>
  </g>

  <!-- Circle ring -->
  <circle cx="100" cy="58" r="32" stroke="#fff" stroke-width="2.5" fill="none" opacity="0.35"/>

  <!-- Thai text: บุญสุข -->
  <text x="100" y="118" text-anchor="middle" fill="#fff" font-family="system-ui,'Noto Sans Thai',sans-serif" font-size="30" font-weight="900" letter-spacing="2">บุญสุข</text>

  <!-- English text -->
  <text x="100" y="142" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="3">ELECTRONICS</text>

  <!-- Tagline -->
  <text x="100" y="164" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui,'Noto Sans Thai',sans-serif" font-size="10" font-weight="600">แอร์ | โซลาร์ | กล้องวงจรปิด</text>
</svg>
